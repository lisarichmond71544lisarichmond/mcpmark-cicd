name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  # Job 1: Issue Triage - Auto-assign labels based on content
  issue-triage:
    runs-on: ubuntu-latest
    outputs:
      is-epic: ${{ steps.triage.outputs.is-epic }}
      priority: ${{ steps.triage.outputs.priority }}
      category: ${{ steps.triage.outputs.category }}
      issue-number: ${{ steps.triage.outputs.issue-number }}
    steps:
      - name: Issue Triage
        id: triage
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const issueNumber = issue.number;
            
            // Initialize labels array
            let labels = [];
            let category = '';
            let priority = '';
            let isEpic = false;
            
            // Category labels based on title keywords
            if (title.includes('bug')) {
              labels.push('bug');
              category = 'bug';
            }
            if (title.includes('epic')) {
              labels.push('epic');
              category = 'epic';
              isEpic = true;
            }
            if (title.includes('maintenance')) {
              labels.push('maintenance');
              category = 'maintenance';
            }
            
            // Priority labels based on title OR body keywords (highest priority wins)
            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            const highKeywords = ['important', 'high', 'blocking'];
            const mediumKeywords = ['medium', 'normal'];
            const lowKeywords = ['low', 'nice-to-have', 'minor'];
            
            const allText = title + ' ' + body;
            
            if (criticalKeywords.some(keyword => allText.includes(keyword))) {
              labels.push('priority-critical');
              priority = 'priority-critical';
            } else if (highKeywords.some(keyword => allText.includes(keyword))) {
              labels.push('priority-high');
              priority = 'priority-high';
            } else if (lowKeywords.some(keyword => allText.includes(keyword))) {
              labels.push('priority-low');
              priority = 'priority-low';
            } else {
              labels.push('priority-medium');
              priority = 'priority-medium';
            }
            
            // All issues get needs-triage label initially
            labels.push('needs-triage');
            
            // Create labels if they don't exist
            const labelDefinitions = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '7057ff', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fbca04', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'ee0701', description: 'High priority issue' },
              { name: 'priority-medium', color: 'fbca04', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'ededed', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: 'fef2c0', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '0052cc', description: 'Issue created by first-time contributor' }
            ];
            
            for (const labelDef of labelDefinitions) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelDef.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: labelDef.name,
                    color: labelDef.color,
                    description: labelDef.description
                  });
                }
              }
            }
            
            // Add labels to issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: labels
            });
            
            // Set outputs for other jobs
            core.setOutput('is-epic', isEpic.toString());
            core.setOutput('priority', priority);
            core.setOutput('category', category);
            core.setOutput('issue-number', issueNumber.toString());

  # Job 2: Task Breakdown - Create sub-issues for epics
  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: needs.issue-triage.outputs.is-epic == 'true'
    outputs:
      sub-issue-numbers: ${{ steps.breakdown.outputs.sub-issue-numbers }}
    steps:
      - name: Create Epic Sub-tasks
        id: breakdown
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parentIssue = context.payload.issue;
            const parentNumber = parentIssue.number;
            const parentTitle = parentIssue.title;
            const parentBody = parentIssue.body || '';
            
            // Task names for sub-issues
            const taskNames = [
              'Requirements Analysis',
              'Design and Architecture', 
              'Implementation',
              'Testing and Documentation'
            ];
            
            const subIssueNumbers = [];
            
            // Create 4 sub-issues
            for (let i = 0; i < taskNames.length; i++) {
              const taskName = taskNames[i];
              const subIssueTitle = `[SUBTASK] ${parentTitle} - Task ${i + 1}: ${taskName}`;
              const subIssueBody = `This is a sub-task of the epic issue #${parentNumber}.\n\nRelated to #${parentNumber}\n\n## Task Description\n${taskName} for the epic: ${parentTitle}\n\n## Parent Issue\n${parentBody}\n\n## Acceptance Criteria\n- [ ] Complete ${taskName.toLowerCase()} for this epic\n- [ ] Ensure all requirements are met\n- [ ] Update documentation as needed`;
              
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subIssueTitle,
                body: subIssueBody,
                labels: ['enhancement', 'needs-review']
              });
              
              subIssueNumbers.push(subIssue.data.number);
            }
            
            // Update parent issue with Epic Tasks checklist
            let epicTasksSection = '\n\n## Epic Tasks\n';
            for (let i = 0; i < subIssueNumbers.length; i++) {
              const taskName = taskNames[i];
              const subIssueNumber = subIssueNumbers[i];
              epicTasksSection += `- [ ] [Task ${i + 1}: ${taskName}](../pull/${subIssueNumber}) (#${subIssueNumber})\n`;
            }
            
            const updatedBody = parentBody + epicTasksSection;
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });
            
            // Output sub-issue numbers as comma-separated string
            core.setOutput('sub-issue-numbers', subIssueNumbers.join(','));

  # Job 3: Auto Response - Handle first-time contributors and issue type responses
  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    steps:
      - name: Auto Response and Milestone Management
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueAuthor = issue.user.login;
            const priority = '${{ needs.issue-triage.outputs.priority }}';
            const category = '${{ needs.issue-triage.outputs.category }}';
            
            // Check if this is the first issue for this user in this repository
            const userIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: issueAuthor,
              state: 'all'
            });
            
            const isFirstTimeContributor = userIssues.data.length === 1;
            
            // Add first-time-contributor label if applicable
            if (isFirstTimeContributor) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });
            }
            
            // Create milestone if it doesn't exist
            try {
              await github.rest.issues.getMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: 1
              });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'v1.0.0',
                  description: 'Version 1.0.0 milestone',
                  state: 'open'
                });
              }
            }
            
            // Set milestone for high and critical priority issues
            if (priority === 'priority-high' || priority === 'priority-critical') {
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              
              const v1Milestone = milestones.data.find(m => m.title === 'v1.0.0');
              if (v1Milestone) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  milestone: v1Milestone.number
                });
              }
            }
            
            // Generate appropriate response based on issue type
            let responseComment = '';
            
            if (isFirstTimeContributor) {
              responseComment += '🎉 **Welcome to your first issue in this repository!** 🎉\n\n';
              responseComment += 'Thank you for taking the time to contribute. We appreciate your effort and will review your issue shortly.\n\n';
            }
            
            if (category === 'bug') {
              responseComment += '## 🐛 Bug Report Guidelines\n\n';
              responseComment += 'Thank you for reporting this bug. To help us address it effectively, please ensure:\n\n';
              responseComment += '- ✅ You\'ve provided clear reproduction steps\n';
              responseComment += '- ✅ You\'ve included relevant environment information\n';
              responseComment += '- ✅ You\'ve added screenshots if applicable\n';
              responseComment += '- ✅ You\'ve checked for existing similar issues\n\n';
              responseComment += 'Our team will review this bug report and provide updates on the investigation progress.\n';
            } else if (category === 'epic') {
              responseComment += '## 🚀 Feature Request Process\n\n';
              responseComment += 'Thank you for submitting this epic feature request! Here\'s what happens next:\n\n';
              responseComment += '1. 📋 **Requirements Analysis**: Our team will analyze the requirements and scope\n';
              responseComment += '2. 🏗️ **Design Phase**: We\'ll create technical specifications and design documents\n';
              responseComment += '3. 📊 **Planning**: The epic will be broken down into manageable tasks\n';
              responseComment += '4. 🚧 **Implementation**: Tasks will be scheduled and assigned to developers\n\n';
              responseComment += 'This epic has been automatically broken down into sub-tasks for better tracking and management.\n';
            } else if (category === 'maintenance') {
              responseComment += '## 🔧 Maintenance Guidelines\n\n';
              responseComment += 'Thank you for identifying this maintenance task. Our maintenance process includes:\n\n';
              responseComment += '- 📊 **Impact Assessment**: Evaluating the scope and risk level\n';
              responseComment += '- 🧪 **Testing Strategy**: Ensuring comprehensive test coverage\n';
              responseComment += '- 📚 **Documentation Updates**: Keeping all documentation current\n';
              responseComment += '- 🔄 **Deployment Planning**: Scheduling changes to minimize disruption\n\n';
              responseComment += 'This maintenance task will be prioritized based on impact and urgency.\n';
            } else {
              responseComment += '## 📝 Issue Review Process\n\n';
              responseComment += 'Thank you for creating this issue. Our maintainers will review it and determine the appropriate next steps.\n\n';
              responseComment += 'We\'ll assess the issue and provide feedback or request additional information if needed.\n';
            }
            
            // Add the response comment
            if (responseComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: responseComment
              });
            }
            
            // Update labels: remove needs-triage, add needs-review
            const currentLabels = issue.labels.map(label => label.name);
            const updatedLabels = currentLabels
              .filter(label => label !== 'needs-triage')
              .concat(['needs-review']);
            
            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: updatedLabels
            });